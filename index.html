<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Bulanan Iuran & Kas</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts untuk tampilan lebih profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Kontrol untuk web (tidak muncul di PDF) -->
        <div class="web-controls no-print">
            <h2><i class="fas fa-sliders-h"></i> Kontrol Laporan</h2>
            <div class="control-group">
                <label for="lotSelect"><i class="fas fa-tag"></i> Pilih Nomor Lot (0-39):</label>
                <input type="number" id="lotSelect" min="0" max="39" step="1" placeholder="Contoh: 12">
            </div>
            <div class="control-group">
                <button id="loadBtn"><i class="fas fa-chart-line"></i> Tampilkan Laporan</button>
                <button id="printBtn" class="print-btn"><i class="fas fa-print"></i> Export PDF</button>
            </div>
            <div id="error" class="error-message"></div>
            <div id="loading" class="loading-message" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> Sedang memuat data...
            </div>
        </div>

        <!-- AREA LAPORAN YANG AKAN DICETAK PDF -->
        <div id="reportContainer" class="report-container">
            <!-- Konten laporan akan diisi oleh JavaScript -->
            <div class="empty-state">
                <i class="fas fa-file-alt"></i>
                <p>Silakan pilih lot dan klik "Tampilkan Laporan"</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
